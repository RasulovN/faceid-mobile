def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}
def kotlinVersion = safeExtGet("VisionCameraFaceLandmarks_kotlinVersion", "2.1.20")

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath "com.android.tools.build:gradle:8.13.0"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${kotlinVersion}"
    }
}

android {
    namespace "com.visioncamerafacelandmarks"
    buildToolsVersion = safeExtGet("VisionCameraFaceLandmarks_buildToolsVersion", "35.0.0")
    ndkVersion safeExtGet("VisionCameraFaceLandmarks_ndkVersion", "27.3.13750724")
    defaultConfig {
        minSdkVersion safeExtGet("VisionCameraFaceLandmarks_minSdkVersion", 26)
        compileSdkVersion safeExtGet("VisionCameraFaceLandmarks_compileSdkVersion", 35)
        targetSdkVersion safeExtGet("VisionCameraFaceLandmarks_targetSdkVersion", 35)
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    lintOptions {
        disable "GradleCompatible"
    }
}

repositories {
    mavenLocal()
    maven {
        // React Native (JS, Obj-C manbalar, Android binarlar) npm'dan o'rnatiladi
        url("$rootDir/../node_modules/react-native/android")
    }
    google()
    mavenCentral()
}

dependencies {
    //noinspection GradleDynamicVersion
    implementation "com.facebook.react:react-native:+" // node_modules'dan
    api project(":react-native-vision-camera")
    implementation "androidx.annotation:annotation:1.9.1"
    implementation "androidx.camera:camera-core:1.5.1"
    // Google MediaPipe Tasks — Face Landmarker (478 mesh + blendshapes)
    implementation "com.google.mediapipe:tasks-vision:0.10.29"
}
